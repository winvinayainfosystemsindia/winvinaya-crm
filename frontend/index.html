<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#232f3e" />
  <meta name="description"
    content="WinVinaya CRM - Empowering merit with professional candidate management and training lifecycle tracking." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://winvinaya.com/" />
  <meta property="og:title" content="WinVinaya CRM | Empowering Merit" />
  <meta property="og:description" content="WinVinaya CRM - Empowering merit with professional candidate management." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://winvinaya.com/" />
  <meta property="twitter:title" content="WinVinaya CRM | Empowering Merit" />
  <meta property="twitter:description"
    content="WinVinaya CRM - Empowering merit with professional candidate management." />
  <meta property="twitter:image" content="/og-image.png" />

  <title>WinVinaya CRM | Empowering Merit</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f2f3f3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #root-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f2f3f3;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(236, 114, 17, 0.1);
      border-radius: 50%;
      border-top-color: #ec7211;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      color: #232f3e;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="root-loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading WinVinaya CRM...</div>
    </div>
  </div>
  <noscript>
    <div style="padding: 20px; text-align: center; font-family: sans-serif;">
      <h2>JavaScript Required</h2>
      <p>Please enable JavaScript to use WinVinaya CRM.</p>
    </div>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
